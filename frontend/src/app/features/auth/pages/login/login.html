<div class="login-container">
  
  <!-- LEFT SIDE -->
  <div class="login-card-wrapper">
    <div class="login-card">
      <div class="logo-area">
        <img src="assets/images/logo.png" alt="AIVAN Logo" class="logo-img" />
        <h2 class="company-name">AIVAN ERP</h2>
        <p class="login-subtitle">LOGIN</p>
      </div>

      <form (ngSubmit)="onLogin()">
        
        <div class="form-group">
          <label>Username</label>
          <input type="email" [(ngModel)]="email" name="email" placeholder="username@gmail.com" required />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" [(ngModel)]="password" name="password" placeholder="********" required />
        </div>

        <div class="remember">
          <input type="checkbox" id="rememberMe" />
          <label for="rememberMe">Remember Me</label>
        </div>

        <button type="submit" class="login-btn">Login</button>
      </form>
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="login-image">
    <img src="assets/images/login-bg.png" alt="login illustration" />
  </div>

</div>
