<div class="login-container">
  <!-- LEFT SIDE -->
  <div class="login-card-wrapper">
    <div class="login-card">
      <div class="logo-area">
        <img src="assets/AivanLogo.png" alt="AIVAN Logo" class="logo-img" />
        <h2 class="company-name">AIVAN ERP</h2>
        <p class="login-subtitle">LOGIN</p>
      </div>


      <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
        <div class="form-group">
          <label>Username</label>
          <input type="email" formControlName="email" placeholder="username@gmail.com" />

          <small *ngIf="f['email'].touched && f['email'].errors">
            <span *ngIf="f['email'].errors['required']">Email is required</span>
            <span *ngIf="f['email'].errors['email']">Invalid email format</span>
          </small>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" formControlName="password" placeholder="********" />

          <small *ngIf="f['password'].touched && f['password'].errors">
            <span *ngIf="f['password'].errors['required']">Password is required</span>
            <span *ngIf="f['password'].errors['minlength']">
              Password must be at least 6 characters
            </span>
          </small>
        </div>

        <div class="remember">
          <input type="checkbox" id="rememberMe" />
          <label for="rememberMe">Remember Me</label>
          <a routerLink="/auth/forgot-password" class="link-text">
            Forgot Password
          </a>
        </div>

        <button type="submit" class="login-btn" [disabled]="loginForm.invalid">Login</button>
      </form>
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="login-image">
    <img src="assets/login-bg.png" alt="login illustration" />
  </div>
</div>

<!-- CENTER POPUP -->
<div *ngIf="showPopup" class="popup-overlay">
  <div class="popup-box" [ngClass]="messageType">
    <p>{{ message }}</p>
  </div>
</div>
