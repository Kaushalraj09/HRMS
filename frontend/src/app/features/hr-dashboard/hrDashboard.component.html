<div class="Hr_dashboard">
  <nav>
    <!-- left side -->
    <div class="leftnav">
      <div class="logo">
        <img src="assets/AivanLogo.png" alt="Logo" />
      </div>
      <div class="hamburger">
        <span class="line long"></span>
        <span class="line mid"></span>
        <span class="line short"></span>
      </div>
      <div class="hrname">
        <span>Hi, AivanHr</span>
      </div>
    </div>

    <!-- right side -->
    <div class="rightnav">
      <div class="searchbar">
        <input type="text" placeholder="Search here" />
        <svg class="search-icon" viewBox="0 0 24 24">
          <path
            d="M21 21L15 15M17 10C17 13.866 13.866 17 10 17C6.13401 17 3 13.866 3 10C3 6.13401 6.13401 3 10 3C13.866 3 17 6.13401 17 10Z"
          />
        </svg>
      </div>

      <div class="globeicon">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10" />
          <path
            d="M2 12H22M12 2C14.5 5 16 8 16 12C16 16 14.5 19 12 22C9.5 19 8 16 8 12C8 8 9.5 5 12 2Z"
          />
        </svg>
      </div>

      <div class="language">
        <mat-form-field appearance="outline">
          <mat-select [(value)]="selectedLang">
            <mat-option value="en">English</mat-option>
            <mat-option value="hi">Hindi</mat-option>
            <mat-option value="es">Spanish</mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <div class="notification">
        <svg viewBox="0 0 24 24">
          <path
            d="M18 8C18 5.79086 16.2091 4 14 4H10C7.79086 4 6 5.79086 6 8V12L4 14V15H20V14L18 12V8Z"
          />
          <path d="M9 19C9.5 20 10.5 21 12 21C13.5 21 14.5 20 15 19" />
        </svg>
        <span class="badge">3</span>
      </div>

      <div class="profile">
        <div class="avatar">HR</div>
        <span class="profilename">AivanHr</span>
        <svg class="chevron-icon" viewBox="0 0 24 24">
          <path d="M6 9L12 15L18 9" />
        </svg>
      </div>
    </div>
  </nav>

  <!-- Dashboard content -->
  <div class="dashboard-content-A">
    <div class="dashboard-content">
      <label for="project">Select Project</label>
      <select id="project">
        <option value="">Choose a project...</option>
        <option value="project1">Project 1</option>
        <option value="project2">Project 2</option>
        <option value="project3">Project 3</option>
      </select>
    </div>
    <div class="dashboard-content">
      <label for="client">Select Client</label>
      <select id="client">
        <option value="">Choose a client...</option>
        <option value="client1">Client 1</option>
        <option value="client2">Client 2</option>
        <option value="client3">Client 3</option>
      </select>
    </div>
  </div>
  <!-- count box -->
  
  <div class="count-box">
    <div class="card total_project">
      <div class="card-content">
        <div>
          <p class="title">TOTAL PROJECTS</p>
          <h2>2</h2>
        </div>
        <i class="fas fa-folder"></i>
      </div>
    </div>
    <div class="card total_clients">
      <div class="card-content">
        <div>
          <p class="title">TOTAL CLIENTS</p>
          <h2>3</h2>
        </div>
        <i class="fas fa-building"></i>
      </div>
    </div>
    <div class="card total_emp">
      <div class="card-content">
        <div>
          <p class="title">TOTAL EMPLOYEES</p>
          <h2>23</h2>
        </div>
        <i class="fas fa-users"></i>
      </div>
    </div>
    <div class="card present_emp">
      <div class="card-content">
        <div>
          <p class="title">PRESENT EMPLOYEES</p>
          <h2>23</h2>
        </div>
        <i class="fas fa-user-check"></i>
      </div>
    </div>
    <div class="card absent_emp">
      <div class="card-content">
        <div>
          <p class="title">ABSENT(Approved)</p>
          <h2>0</h2>
        </div>
        <i class="fas fa-user-clock"></i>
      </div>
    </div>
    <div class="card unschegule_abs">
      <div class="card-content">
        <div>
          <p class="title">UNSCHEDULED ABSENTS</p>
          <h2>0</h2>
        </div>
        <i class="fas fa-user-times"></i>
      </div>
    </div>
  </div>

<!-- chart data -->
 <div class="chart_data">
  <div class="card work_breakdown">
    <h2>Work Location Breakdown</h2>

  </div>
  <div class="card gender_breakdown">
    <h2>Gender Breakdown</h2>

  </div>
  <div class="card upcoming_events">
    <h2>Upcoming Events</h2>

  </div>
</div>


</div>
